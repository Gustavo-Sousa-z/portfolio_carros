name: Build & Deploy Portfólio

on:
  push:
    branches: [main]
    paths:
      - "carros/**"
      - "scripts/build.py"
  schedule:
    # Roda todo dia às 6h (horário de Brasília = 9h UTC)
    - cron: "0 9 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar index.html
        run: python scripts/build.py

      - name: Commit index.html (se houve mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: atualiza portfólio [skip ci]"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # pega o commit atualizado pelo job build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
